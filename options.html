<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoubleClickNewTab - 設定</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #202124;
      background: #fff;
      width: 320px;
      padding: 16px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #202124;
    }

    .section {
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      cursor: pointer;
    }

    .option-row:not(:last-child) {
      border-bottom: 1px solid #f1f3f4;
    }

    .option-row input[type="radio"] {
      width: 16px;
      height: 16px;
      accent-color: #1a73e8;
      cursor: pointer;
      flex-shrink: 0;
    }

    .option-label {
      font-size: 13px;
      color: #202124;
      cursor: pointer;
      line-height: 1.4;
    }

    .option-label .sub {
      font-size: 11px;
      color: #5f6368;
      margin-top: 1px;
    }

    #status {
      font-size: 12px;
      color: #1a73e8;
      text-align: center;
      height: 18px;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>
  <h1>DoubleClickNewTab 設定</h1>

  <div class="section">
    <div class="section-title">ダブルクリックで開く方法</div>

    <label class="option-row">
      <input type="radio" name="tabMode" value="foreground" id="modeForeground">
      <div class="option-label">
        新しいタブを前面で開く
        <div class="sub">ダブルクリックしたタブに切り替わります（デフォルト）</div>
      </div>
    </label>

    <label class="option-row">
      <input type="radio" name="tabMode" value="background" id="modeBackground">
      <div class="option-label">
        バックグラウンドで開く
        <div class="sub">現在のページを見ながら新しいタブを開きます</div>
      </div>
    </label>
  </div>

  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
